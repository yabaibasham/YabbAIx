<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YabbAIx - An AI-powered application with JavaScript, Python, and TypeScript stack">
    <title>YabbAIx - AI Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 800px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: 700;
        }
        
        .tech-stack {
            margin: 40px 0;
        }
        
        .tech-stack h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
            margin-top: 20px;
        }
        
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .tech-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .tech-percent {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        
        a {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 YabbAIx</h1>
        <p class="subtitle">An AI-powered application combining JavaScript, Python, and TypeScript</p>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Repository</div>
                <div class="stat-value">YabbAIx</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Status</div>
                <div class="stat-value">Active</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Type</div>
                <div class="stat-value">Public</div>
            </div>
        </div>
        
        <div class="tech-stack">
            <h2>📊 Technology Stack</h2>
            <div class="tech-grid">
                <div class="tech-badge">
                    <span>JavaScript</span>
                    <span class="tech-percent">70.6%</span>
                </div>
                <div class="tech-badge">
                    <span>Python</span>
                    <span class="tech-percent">17.4%</span>
                </div>
                <div class="tech-badge">
                    <span>TypeScript</span>
                    <span class="tech-percent">9.3%</span>
                </div>
                <div class="tech-badge">
                    <span>HTML</span>
                    <span class="tech-percent">1.5%</span>
                </div>
                <div class="tech-badge">
                    <span>CSS</span>
                    <span class="tech-percent">1.2%</span>
                </div>
            </div>
        </div>
        
        <div class="links">
            <a href="https://github.com/yabaibasham/YabbAIx" class="btn-primary">View on GitHub</a>
            <a href="https://github.com/yabaibasham/YabbAIx#readme" class="btn-secondary">Documentation</a>
        </div>
        
        <div class="footer">
            <p>YabbAIx © 2026 - Powered by GitHub Pages</p>
        </div>
    </div>
</body>
</html>
