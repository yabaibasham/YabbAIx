<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YabbAIx</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 700px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .tech {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 30px 0;
        }
        
        .tech-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .percent {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .buttons {
            margin-top: 30px;
        }
        
        a {
            display: inline-block;
            margin: 0 10px;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-github {
            background: #333;
            color: white;
        }
        
        .btn-github:hover {
            background: #555;
        }
        
        .btn-docs {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }
        
        .btn-docs:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 YabbAIx</h1>
        <p>An AI-powered application combining JavaScript, Python, and TypeScript</p>
        
        <div class="tech">
            <div class="tech-item">
                JavaScript
                <div class="percent">70.6%</div>
            </div>
            <div class="tech-item">
                Python
                <div class="percent">17.4%</div>
            </div>
            <div class="tech-item">
                TypeScript
                <div class="percent">9.3%</div>
            </div>
            <div class="tech-item">
                HTML
                <div class="percent">1.5%</div>
            </div>
            <div class="tech-item">
                CSS
                <div class="percent">1.2%</div>
            </div>
        </div>
        
        <div class="buttons">
            <a href="https://github.com/yabaibasham/YabbAIx" class="btn-github">View on GitHub</a>
            <a href="https://github.com/yabaibasham/YabbAIx/blob/main/README.md" class="btn-docs">Documentation</a>
        </div>
    </div>
</body>
</html>
